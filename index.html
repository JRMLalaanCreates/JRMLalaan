<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRM Lalaan Worship Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent: #fbbf24;
            --text-main: #fef3c7;
            --text-dim: #94a3b8;
            --forest: #064e3b;
            --indigo: #3730a3;
            --white: #ffffff;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .nav-links button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            margin-left: 10px;
            transition: 0.3s;
            font-family: var(--font-sans);
        }

        .nav-links button:hover {
            background: var(--accent);
            color: var(--bg-deep);
        }

        h1, h2, h3 { font-family: var(--font-serif); }

        .btn {
            background: var(--accent);
            color: var(--bg-deep);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            font-family: var(--font-sans);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            background: var(--bg-card);
            border: 1px solid #334155;
            color: var(--text-main);
            border-radius: 6px;
            font-family: var(--font-sans);
        }

        /* --- SYNC STATUS --- */
        #sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid #334155;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
        }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
        .sync-dot.synced { background: #22c55e; }
        .sync-dot.syncing { background: #fbbf24; animation: pulse 1s infinite; }
        .sync-dot.error { background: #ef4444; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-deep);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999; gap: 16px;
        }
        #loading-overlay h2 { font-family: var(--font-serif); color: var(--accent); font-size: 2rem; }
        #loading-overlay p { color: var(--text-dim); }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(251,191,36,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- LINEUP HERO --- */
        .lineup-hero {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #1e293b 100%);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 16px;
            padding: 28px 30px;
            margin-bottom: 36px;
            position: relative;
            overflow: hidden;
        }
        .lineup-hero::before {
            content: '🎵';
            position: absolute;
            right: 24px; top: 50%; transform: translateY(-50%);
            font-size: 5rem;
            opacity: 0.08;
        }
        .lineup-hero-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #a5b4fc;
            margin-bottom: 6px;
        }
        .lineup-hero h2 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .lineup-hero-date {
            font-size: 0.82rem;
            color: #a5b4fc;
            margin-bottom: 18px;
        }
        .lineup-song-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }
        .lineup-song-pill {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #e0e7ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .lineup-hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .lineup-hero-actions .btn { background: #6366f1; color: #fff; }
        .lineup-hero-actions .btn:hover { background: #4f46e5; }
        .lineup-hero-actions .btn-sm {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            color: #e0e7ff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
        }
        .lineup-hero-actions .btn-sm:hover { background: rgba(255,255,255,0.1); }
        .lineup-hero.empty {
            background: var(--bg-card);
            border: 2px dashed #334155;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .lineup-hero.empty::before { display: none; }
        .lineup-hero.empty p { color: var(--text-dim); font-size: 0.9rem; flex: 1; }

        /* --- SONG LIST --- */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .section-header h3 { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text-dim); }
        .search-bar { margin-bottom: 20px; }
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .song-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            border-left: 4px solid var(--accent);
        }
        .song-card:hover { transform: translateY(-5px); }
        .song-card h3 { margin-bottom: 5px; color: var(--accent); }
        .song-card p { font-size: 0.9rem; color: var(--text-dim); }
        .tag {
            display: inline-block;
            background: var(--forest);
            color: #ecfdf5;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-top: 10px;
        }

        /* --- LINEUP VIEW --- */
        .lineup-section-header {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 30px;
        }
        .lineup-section-header h1 { font-size: 2.2rem; }
        .lineup-date-badge {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            color: #a5b4fc;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        /* --- UNIFIED LINEUP PANEL --- */
        .lineup-unified-panel {
            background: #fff;
            color: #333;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            font-family: var(--font-mono);
            font-size: 1rem;
        }
        .lineup-song-section {
            padding: 36px 40px;
        }
        .lineup-song-section + .lineup-song-section {
            border-top: 3px solid #e2e8f0;
        }
        .lineup-song-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .lineup-song-num {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6366f1;
            margin-bottom: 3px;
            font-family: var(--font-sans);
        }
        .lineup-song-meta h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            color: #1e1b4b;
            margin-bottom: 2px;
        }
        .lineup-song-meta p {
            font-size: 0.8rem;
            color: #64748b;
            font-family: var(--font-sans);
        }
        .lineup-open-btn {
            background: transparent;
            border: 1px solid #c7d2fe;
            color: #6366f1;
            padding: 5px 13px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            white-space: nowrap;
        }
        .lineup-open-btn:hover { background: #eef2ff; }

        /* --- LINEUP FONT TOOLBAR --- */
        .lineup-toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-deep);
            border-bottom: 1px solid #334155;
            padding: 10px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lineup-toolbar label {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .font-size-presets {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 3px;
        }
        .font-size-presets button {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: var(--font-sans);
            font-weight: 600;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .font-size-presets button:hover { background: #334155; }
        .font-size-presets button.active { background: var(--accent); color: var(--bg-deep); }
        .font-nudge-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 3px 8px;
        }
        .font-nudge {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 28px; height: 28px;
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.15s;
            font-family: var(--font-sans);
        }
        .font-nudge:hover { background: #334155; }
        #lineup-font-display {
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 700;
            min-width: 34px;
            text-align: center;
        }
        .lineup-unified-panel {
            overflow-x: auto;
        }

        /* --- SONG DETAIL --- */
        .controls-panel {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .control-group { flex: 1; min-width: 150px; }
        .control-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }

        /* --- LEADER KEY INDICATOR --- */
        #leader-key-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        #leader-key-indicator.has-key {
            display: flex;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #86efac;
        }
        #leader-key-indicator.no-key {
            display: flex;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: var(--text-dim);
        }
        #leader-key-indicator .indicator-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        #leader-key-indicator.has-key .indicator-dot { background: #22c55e; }
        #leader-key-indicator.no-key .indicator-dot { background: #64748b; }

        /* --- SAVE KEY PANEL --- */
        #save-key-panel {
            display: none;
            background: rgba(251, 191, 36, 0.07);
            border: 1px solid rgba(251, 191, 36, 0.25);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 20px;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        #save-key-panel.visible { display: flex; }
        #save-key-panel p { font-size: 0.85rem; color: var(--text-dim); flex: 1; }
        #save-key-panel p strong { color: var(--accent); }
        #save-key-panel .btn { padding: 8px 16px; font-size: 0.85rem; }
        #save-key-panel .btn-outline { padding: 8px 16px; font-size: 0.85rem; color: #f87171; border-color: #f87171; }

        .diatonic-helper { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .diatonic-pill {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-align: center;
        }
        .diatonic-pill span { display: block; font-size: 0.6rem; opacity: 0.7; }

        #chord-chart-container {
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .chord { color: #b45309; font-weight: bold; position: relative; display: inline-block; height: 0; vertical-align: top; top: -1.2em; }
        .lyric-line { display: block; margin-bottom: 1.5em; position: relative; }

        /* --- PERFORMANCE VIEW --- */
        .performance-mode {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; color: black;
            z-index: 1000; padding: 50px; overflow-y: auto;
        }
        .perf-close { position: fixed; top: 20px; right: 20px; }

        /* --- LEADERS --- */
        .leader-card {
            background: var(--bg-card); padding: 20px; border-radius: 12px;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
        }
        .avatar {
            width: 40px; height: 40px; background: var(--accent); color: var(--bg-deep);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; margin-right: 15px;
        }
        .keys-badge {
            display: inline-block;
            background: rgba(251,191,36,0.12);
            border: 1px solid rgba(251,191,36,0.3);
            color: var(--accent);
            padding: 2px 10px; border-radius: 12px;
            font-size: 0.78rem; cursor: pointer;
            transition: background 0.2s; margin-top: 4px;
        }
        .keys-badge:hover { background: rgba(251,191,36,0.25); }
        .keys-badge.zero { color: var(--text-dim); border-color: #334155; background: transparent; cursor: default; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: var(--bg-card); border-radius: 16px; padding: 30px;
            max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto;
            border: 1px solid #334155;
        }
        .modal-box h3 { font-family: var(--font-serif); color: var(--accent); margin-bottom: 6px; }
        .modal-box .modal-sub { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
        .modal-song-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #1e293b;
        }
        .modal-song-row:last-child { border-bottom: none; }
        .modal-song-row .song-name { font-weight: 600; font-size: 0.9rem; }
        .modal-song-row .song-artist { font-size: 0.78rem; color: var(--text-dim); }
        .key-chip {
            background: var(--accent); color: var(--bg-deep);
            font-weight: bold; padding: 3px 12px; border-radius: 20px; font-size: 0.85rem;
        }
        .modal-close-btn { width: 100%; margin-top: 20px; }

        /* --- LINEUP MODAL --- */
        .lineup-modal-box {
            max-width: 640px;
        }
        .lineup-modal-box input[type="text"] { margin-bottom: 8px; }
        .lineup-song-picker {
            border: 1px solid #334155;
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .picker-song-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #0f172a;
            cursor: pointer;
            transition: background 0.15s;
        }
        .picker-song-row:last-child { border-bottom: none; }
        .picker-song-row:hover { background: rgba(255,255,255,0.04); }
        .picker-song-row.selected { background: rgba(99,102,241,0.12); }
        .picker-check {
            width: 20px; height: 20px; border-radius: 5px;
            border: 2px solid #334155;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 0.75rem;
            transition: all 0.15s;
        }
        .picker-song-row.selected .picker-check {
            background: #6366f1; border-color: #6366f1; color: #fff;
        }
        .picker-song-info { flex: 1; }
        .picker-song-info strong { display: block; font-size: 0.9rem; }
        .picker-song-info span { font-size: 0.78rem; color: var(--text-dim); }
        .picker-order-badge {
            background: #6366f1; color: #fff;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700;
        }
        .selected-order-list {
            margin-bottom: 16px;
        }
        .order-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px;
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.88rem;
        }
        .order-num {
            width: 22px; height: 22px; border-radius: 50%;
            background: #6366f1; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
        }
        .order-item-title { flex: 1; font-weight: 600; }
        .order-item-artist { color: var(--text-dim); font-size: 0.78rem; }
        .order-remove {
            background: none; border: none; color: #f87171;
            cursor: pointer; font-size: 1rem; padding: 0 4px;
        }
        .modal-divider {
            border: none; border-top: 1px solid #334155;
            margin: 16px 0;
        }
        .modal-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .modal-row .btn { flex: 1; }
        .modal-row .btn-outline { flex: 1; }

        .hidden { display: none; }

        .empty-state { text-align: center; color: var(--text-dim); padding: 60px 20px; }
        .empty-state p { font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <h2>JRM Lalaan</h2>
        <div class="spinner"></div>
        <p>Loading worship songs…</p>
    </div>

    <!-- Sync Status -->
    <div id="sync-status">
        <div class="sync-dot syncing" id="sync-dot"></div>
        <span id="sync-label">Connecting…</span>
    </div>

    <!-- Leader Keys Modal -->
    <div id="leader-keys-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modal-leader-name"></h3>
            <p class="modal-sub">Saved preferred keys</p>
            <div id="modal-keys-list"></div>
            <button class="btn modal-close-btn" onclick="app.closeLeaderModal()">Close</button>
        </div>
    </div>

    <!-- Create / Edit Lineup Modal -->
    <div id="lineup-modal" class="modal-overlay hidden">
        <div class="modal-box lineup-modal-box">
            <h3 id="lineup-modal-title">Create This Week's Lineup</h3>
            <p class="modal-sub">Give it a name, pick a date, then select and order your songs.</p>

            <label style="font-size:0.8rem;color:var(--text-dim)">Lineup Title</label>
            <input type="text" id="lineup-name-input" placeholder="e.g. Sunday Morning Service">

            <label style="font-size:0.8rem;color:var(--text-dim)">Date</label>
            <input type="date" id="lineup-date-input">

            <hr class="modal-divider">

            <label style="font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;display:block">Select Songs (click to add in order)</label>
            <input type="text" id="lineup-search-input" placeholder="Search songs…" oninput="app.filterLineupPicker()" style="margin-bottom:8px;">

    <div class="container" id="main-nav">

                <button onclick="app.showSongs()">Songs</button>

    <!-- VIEW: SONG LIST (home) -->
    <div id="view-list" class="container view">
        <!-- Lineup Hero -->
        <div id="lineup-hero-section"></div>

        <div class="section-header">
            <h3>All Songs</h3>

    <!-- VIEW: LINEUP (grouped chords) -->
    <div id="view-lineup" class="container view hidden">
        <div style="margin-bottom:20px">
            <button class="btn-outline" onclick="app.showSongs()">← Back</button>

        <div class="lineup-section-header">
            <h1 id="lineup-view-title"></h1>

        <!-- Sticky font size toolbar -->
        <div class="lineup-toolbar">
            <label>Text Size:</label>
            <div class="font-size-presets">
                <button onclick="app.setLineupFont(11)" id="lf-xs">XS</button>

                <button onclick="app.setLineupFont(15)" id="lf-md" class="active">M</button>

                <button class="font-nudge" onclick="app.nudgeLineupFont(1)" title="Increase">+</button>

        <div id="lineup-charts-container"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" onclick="app.openLineupModal(true)" style="background:#6366f1;color:#fff">✏️ Edit Lineup</button>
            <button class="btn-outline" style="color:#f87171;border-color:#f87171" onclick="app.deleteLineup()">Delete Lineup</button>

    <!-- VIEW: SONG DETAIL -->
    <div id="view-detail" class="container view hidden">
        <div style="margin-bottom: 20px;">
            <button class="btn-outline" onclick="app.showSongs()">← Back</button>

        <h1 id="detail-title" style="font-size: 2.5rem; margin-bottom: 5px;"></h1>

        <div class="controls-panel">
            <div class="control-group">
                <label>Song Leader</label>
                <select id="leader-select" onchange="app.handleLeaderChange()">
                    <option value="">Default Key</option>
                </select>
            </div>
            <div class="control-group">
                <label>Transpose Key</label>
                <select id="key-select" onchange="app.handleManualKeyChange()"></select>
            </div>
            <div class="control-group">
                <label>Font Size</label>
                <input type="range" min="12" max="30" value="18" oninput="app.updateFontSize(this.value)">
            </div>
            <div class="control-group">
                <button class="btn" onclick="app.enterPerformanceMode()">Performance View</button>

            <div class="control-group">

        <div id="leader-key-indicator">

        <div id="save-key-panel">
            <p id="save-key-desc"></p>
            <button class="btn" onclick="app.saveKeyForLeader()">💾 Save Key</button>
            <button class="btn-outline" onclick="app.removeKeyForLeader()" id="remove-key-btn">✕ Remove Saved Key</button>
        </div>

        <div id="diatonic-helper" class="diatonic-helper"></div>
        <div id="chord-chart-container"></div>

        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button class="btn-outline" onclick="app.editCurrentSong()">Edit Song</button>
            <button class="btn-outline" style="color: #f87171; border-color: #f87171;" onclick="app.deleteCurrentSong()">Delete</button>
        </div>

    <!-- VIEW: ADD/EDIT SONG -->
    <div id="view-edit" class="container view hidden">
        <h2 id="edit-view-title">Add New Song</h2>
        <div id="song-form">
            <input type="hidden" id="edit-id">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Title</label><input type="text" id="edit-title"></div>
                <div><label>Artist</label><input type="text" id="edit-artist"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px;">
                <div><label>Default Key</label><select id="edit-key"></select></div>
                <div><label>BPM</label><input type="number" id="edit-bpm"></div>
                <div><label>Time Sig</label><input type="text" id="edit-time" placeholder="4/4"></div>
                <div><label>Tags (comma separated)</label><input type="text" id="edit-tags" placeholder="Worship, Praise"></div>
            </div>
            <label>Chord Chart (Use [Chord] before lyrics)</label>
            <textarea id="edit-chart" rows="15" style="font-family: var(--font-mono);"></textarea>
            <button class="btn" onclick="app.saveSong()">Save Song</button>
            <button class="btn-outline" onclick="app.showSongs()" style="margin-left: 10px;">Cancel</button>
        </div>
    </div>

    <!-- VIEW: LEADERS -->
    <div id="view-leaders" class="container view hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Song Leaders</h2>
            <button class="btn" onclick="app.addLeader()">+ Add Leader</button>
        </div>
        <div id="leaders-list"></div>
    </div>

    <!-- PERFORMANCE VIEW -->
    <div id="performance-view" class="performance-mode hidden">
        <button class="btn perf-close" onclick="app.exitPerformanceMode()">Close</button>
        <div id="performance-content" style="font-family: var(--font-mono);"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc,
            onSnapshot, orderBy, query, limit, writeBatch, setDoc
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCgMy7M9S3THmv4OZMCQOeIbxYbbiNfu0",
            authDomain: "jrm-lalaan-chords.firebaseapp.com",
            projectId: "jrm-lalaan-chords",
            storageBucket: "jrm-lalaan-chords.firebasestorage.app",
            messagingSenderId: "1049411098418",
            appId: "1:1049411098418:web:e61b2b9040b42d4daee92b"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        const CHROMATIC_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const CHROMATIC_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

        const SEED_SONGS = [
            { title: "Amazing Grace", artist: "John Newton", defaultKey: "G", tempo: 75, timeSignature: "3/4", tags: ["Hymn","Classic"], chordChart: "[G]Amazing grace how [C]sweet the [G]sound\nThat saved a [G]wretch like [D]me\nI [G]once was lost but [C]now am [G]found\nWas [G]blind but [D]now I [G]see" },
            { title: "10,000 Reasons", artist: "Matt Redman", defaultKey: "G", tempo: 73, timeSignature: "4/4", tags: ["Worship","Bless"], chordChart: "[C]Bless the [G]Lord O my [D]soul [Em]O my [C]soul\n[G]Worship His [D]holy name\nSing like [C]never be[G]fore [C]O [D]my [Em]soul\nI'll [C]worship Your [D]holy [G]name" },
            { title: "Way Maker", artist: "Sinach", defaultKey: "C", tempo: 68, timeSignature: "4/4", tags: ["Worship","Miracle"], chordChart: "You are [F]Way Maker, Miracle Worker\n[C]Promise Keeper, Light in the darkness\n[G]My God, that is who You [Am]are" },
            { title: "Good Good Father", artist: "Chris Tomlin", defaultKey: "A", tempo: 72, timeSignature: "6/8", tags: ["Worship","Father"], chordChart: "You're a [A]good good Father\nIt's who You [D]are, it's who You [A]are\nAnd I'm [A]loved by You\nIt's who I [D]am, it's who I [A]am" },
            { title: "What A Beautiful Name", artist: "Hillsong Worship", defaultKey: "D", tempo: 68, timeSignature: "4/4", tags: ["Worship","Jesus"], chordChart: "What a [D]beautiful Name it is\nWhat a [A]beautiful Name it is\nThe [Bm]Name of [A]Jesus [G]Christ my King" }
        ];

        const SEED_LEADERS = [
            { name: "David",  initials: "D", preferredKeys: {} },
            { name: "Sarah",  initials: "S", preferredKeys: {} }
        ];

        const app = {
            songs: [],
            leaders: [],
            lineup: null,           // current active lineup doc
            lineupSelectedIds: [],  // for modal picker (ordered)
            currentSongId: null,
            currentKey: 'C',
            useFlats: false,
            pendingKeyChange: false,

            async init() {
                this.populateKeyDropdowns();
                this.setSyncStatus('syncing', 'Connecting…');
                try {
                    await this.seedIfEmpty();
                    this.listenSongs();
                    this.listenLeaders();
                    this.listenLineup();
                } catch (err) {
                    console.error('Init error:', err);
                    this.setSyncStatus('error', 'Connection failed');
                    this.hideLoading();
                }
            },

            setSyncStatus(state, label) {
                document.getElementById('sync-dot').className = 'sync-dot ' + state;
                document.getElementById('sync-label').textContent = label;
            },

            hideLoading() {
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.4s';
                setTimeout(() => overlay.style.display = 'none', 400);
            },

            async seedIfEmpty() {
                const songsCol = collection(db, 'songs');
                const snap = await getDocs(query(songsCol, limit(1)));
                if (snap.empty) {
                    const batch = writeBatch(db);
                    SEED_SONGS.forEach(s => batch.set(doc(songsCol), s));
                    const leadersCol = collection(db, 'leaders');
                    SEED_LEADERS.forEach(l => batch.set(doc(leadersCol), l));
                    await batch.commit();
                }
            },

            listenSongs() {
                const q = query(collection(db, 'songs'), orderBy('title'));
                onSnapshot(q, snap => {
                    this.songs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.renderSongList(this.songs);
                    if (this.currentSongId && !document.getElementById('view-detail').classList.contains('hidden')) {
                        const still = this.songs.find(s => s.id === this.currentSongId);
                        if (still) this.renderChart();
                    }
                    this.setSyncStatus('synced', 'Synced ✓');
                    this.hideLoading();
                    if (document.querySelectorAll('.view:not(.hidden)').length === 0) this.showSongs();
                }, err => {
                    console.error(err);
                    this.setSyncStatus('error', 'Sync error');
                    this.hideLoading();
                });
            },

            listenLeaders() {
                const q = query(collection(db, 'leaders'), orderBy('name'));
                onSnapshot(q, snap => {
                    this.leaders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (!document.getElementById('view-leaders').classList.contains('hidden')) this.renderLeadersList();
                    if (!document.getElementById('view-detail').classList.contains('hidden')) this.updateLeaderKeyUI();
                }, err => console.error(err));
            },

            // ── Lineup Firestore (single doc: lineups/current) ─────────────
            listenLineup() {
                const lineupDoc = doc(db, 'lineups', 'current');
                onSnapshot(lineupDoc, snap => {
                    this.lineup = snap.exists() ? snap.data() : null;
                    this.renderLineupHero();
                }, err => console.error('Lineup listener:', err));
            },

            async saveLineup() {
                const name = document.getElementById('lineup-name-input').value.trim();
                const date = document.getElementById('lineup-date-input').value;
                if (!name) { alert('Please enter a lineup title.'); return; }
                if (this.lineupSelectedIds.length === 0) { alert('Please select at least one song.'); return; }

                const data = {
                    name,
                    date: date || '',
                    songIds: this.lineupSelectedIds
                };
                this.setSyncStatus('syncing', 'Saving…');
                try {
                    await setDoc(doc(db, 'lineups', 'current'), data);
                    this.setSyncStatus('synced', 'Saved ✓');
                    this.closeLineupModal();
                } catch (err) {
                    console.error(err);
                    this.setSyncStatus('error', 'Save failed');
                }
            },

            async deleteLineup() {
                if (!confirm('Remove this lineup?')) return;
                this.setSyncStatus('syncing', 'Removing…');
                try {
                    await deleteDoc(doc(db, 'lineups', 'current'));
                    this.setSyncStatus('synced', 'Removed ✓');
                    this.showSongs();
                } catch (err) {
                    console.error(err);
                    this.setSyncStatus('error', 'Remove failed');
                }
            },

            // ── Lineup Hero (homepage) ─────────────────────────────────────
            renderLineupHero() {
                const section = document.getElementById('lineup-hero-section');
                if (!section) return;
                if (!this.lineup) {
                    section.innerHTML = `
                        <div class="lineup-hero empty">
                            <div>
                                <div style="font-size:1.5rem;margin-bottom:6px;">📋</div>
                                <p>No lineup set for this week yet.</p>
                            </div>
                            <button class="btn" onclick="app.openLineupModal()" style="background:#6366f1;color:#fff;flex-shrink:0">+ Create Lineup</button>
                        </div>`;
                    return;
                }
                const songs = (this.lineup.songIds || []).map(id => this.songs.find(s => s.id === id)).filter(Boolean);
                const dateStr = this.lineup.date
                    ? new Date(this.lineup.date + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })
                    : '';

                section.innerHTML = `
                    <div class="lineup-hero">
                        <div class="lineup-hero-label">🎵 This Week's Lineup</div>
                        <h2>${this.escHtml(this.lineup.name)}</h2>
                        ${dateStr ? `<div class="lineup-hero-date">${dateStr}</div>` : ''}
                        <div class="lineup-song-pills">
                            ${songs.map((s,i) => `<span class="lineup-song-pill">${i+1}. ${this.escHtml(s.title)}</span>`).join('')}
                        </div>
                        <div class="lineup-hero-actions">
                            <button class="btn" onclick="app.viewLineup()">View All Chords →</button>
                            <button class="btn-sm" onclick="app.openLineupModal(true)">✏️ Edit</button>
                        </div>
                    </div>`;
            },

            // ── Lineup View (grouped chords) ───────────────────────────────
            viewLineup() {
                if (!this.lineup) return;
                const songs = (this.lineup.songIds || []).map(id => this.songs.find(s => s.id === id)).filter(Boolean);
                const dateStr = this.lineup.date
                    ? new Date(this.lineup.date + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })
                    : '';

                document.getElementById('lineup-view-title').textContent = this.lineup.name;
                document.getElementById('lineup-view-date').textContent = dateStr;
                document.getElementById('lineup-view-date').style.display = dateStr ? '' : 'none';

                const container = document.getElementById('lineup-charts-container');
                const sectionsHtml = songs.map((song, idx) => {
                    const chartHtml = this.buildChartHtml(song, song.defaultKey);
                    return `
                        <div class="lineup-song-section">
                            <div class="lineup-song-meta">
                                <div>
                                    <div class="lineup-song-num">Song ${idx + 1} of ${songs.length}</div>
                                    <h3>${this.escHtml(song.title)}</h3>
                                    <p>${this.escHtml(song.artist)} &bull; Key of ${song.defaultKey} &bull; ${song.tempo} BPM &bull; ${song.timeSignature}</p>
                                </div>
                                <button class="lineup-open-btn" onclick="app.viewSong('${song.id}')">Open Song →</button>
                            </div>
                            <div style="white-space:pre;overflow-x:auto;">${chartHtml}</div>
                        </div>`;
                }).join('');
                container.innerHTML = `<div class="lineup-unified-panel">${sectionsHtml}</div>`;

                this.showView('view-lineup');
            },

            // ── Lineup Modal ───────────────────────────────────────────────
            openLineupModal(editing = false) {
                this.lineupSelectedIds = editing && this.lineup ? [...(this.lineup.songIds || [])] : [];
                document.getElementById('lineup-name-input').value = editing && this.lineup ? this.lineup.name : '';
                document.getElementById('lineup-date-input').value = editing && this.lineup ? this.lineup.date : '';
                document.getElementById('lineup-search-input').value = '';
                document.getElementById('lineup-modal-title').textContent = editing ? 'Edit Lineup' : "Create This Week's Lineup";
                this.renderLineupPicker(this.songs);
                this.renderSelectedOrder();
                document.getElementById('lineup-modal').classList.remove('hidden');
            },

            closeLineupModal() {
                document.getElementById('lineup-modal').classList.add('hidden');
            },

            filterLineupPicker() {
                const term = document.getElementById('lineup-search-input').value.toLowerCase();
                const filtered = this.songs.filter(s =>
                    s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term)
                );
                this.renderLineupPicker(filtered);
            },

            renderLineupPicker(list) {
                const picker = document.getElementById('lineup-song-picker');
                picker.innerHTML = list.map(s => {
                    const idx = this.lineupSelectedIds.indexOf(s.id);
                    const selected = idx !== -1;
                    return `
                        <div class="picker-song-row ${selected ? 'selected' : ''}" onclick="app.toggleLineupSong('${s.id}')">
                            <div class="picker-check">${selected ? '✓' : ''}</div>
                            <div class="picker-song-info">
                                <strong>${this.escHtml(s.title)}</strong>
                                <span>${this.escHtml(s.artist)} &bull; ${s.defaultKey}</span>
                            </div>
                            ${selected ? `<div class="picker-order-badge">${idx + 1}</div>` : ''}
                        </div>`;
                }).join('');
            },

            toggleLineupSong(songId) {
                const idx = this.lineupSelectedIds.indexOf(songId);
                if (idx === -1) {
                    this.lineupSelectedIds.push(songId);
                } else {
                    this.lineupSelectedIds.splice(idx, 1);
                }
                const term = document.getElementById('lineup-search-input').value.toLowerCase();
                const filtered = this.songs.filter(s =>
                    s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term)
                );
                this.renderLineupPicker(filtered);
                this.renderSelectedOrder();
            },

            renderSelectedOrder() {
                const wrap = document.getElementById('selected-order-wrap');
                const list = document.getElementById('selected-order-list');
                if (this.lineupSelectedIds.length === 0) {
                    wrap.classList.add('hidden');
                    return;
                }
                wrap.classList.remove('hidden');
                list.innerHTML = this.lineupSelectedIds.map((id, idx) => {
                    const song = this.songs.find(s => s.id === id);
                    if (!song) return '';
                    return `
                        <div class="order-item">
                            <div class="order-num">${idx + 1}</div>
                            <div class="order-item-title">${this.escHtml(song.title)}</div>
                            <div class="order-item-artist">${this.escHtml(song.artist)}</div>
                            <button class="order-remove" onclick="app.toggleLineupSong('${id}')" title="Remove">✕</button>
                        </div>`;
                }).join('');
            },

            // ── Views ──────────────────────────────────────────────────────
            showView(viewId) {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById(viewId).classList.remove('hidden');
                window.scrollTo(0, 0);
            },

            showSongs() {
                this.showView('view-list');
                this.renderSongList(this.songs);
                this.renderLineupHero();
            },

            filterSongs() {
                const term = document.getElementById('song-search').value.toLowerCase();
                const filtered = this.songs.filter(s =>
                    s.title.toLowerCase().includes(term) ||
                    s.artist.toLowerCase().includes(term) ||
                    (s.tags || []).some(t => t.toLowerCase().includes(term))
                );
                this.renderSongList(filtered);
            },

            renderSongList(list) {
                const grid = document.getElementById('song-grid');
                if (list.length === 0) {
                    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>No songs found.</p></div>`;
                    return;
                }
                grid.innerHTML = list.map(s => `
                    <div class="song-card" onclick="app.viewSong('${s.id}')">
                        <h3>${this.escHtml(s.title)}</h3>
                        <p>${this.escHtml(s.artist)} • ${s.defaultKey}</p>
                        <div>${(s.tags||[]).map(t => `<span class="tag">${this.escHtml(t)}</span>`).join('')}</div>
                    </div>`).join('');
            },

            viewSong(id) {
                const song = this.songs.find(s => s.id === id);
                if (!song) return;
                this.currentSongId = id;
                this.currentKey = song.defaultKey;
                this.pendingKeyChange = false;
                this.showView('view-detail');

                document.getElementById('detail-title').innerText = song.title;
                document.getElementById('detail-meta').innerText =
                    `${song.artist} | ${song.tempo} BPM | ${song.timeSignature}`;

                const lSelect = document.getElementById('leader-select');
                lSelect.innerHTML = `<option value="">Original Key (${song.defaultKey})</option>` +
                    this.leaders.map(l => `<option value="${l.id}">${this.escHtml(l.name)}</option>`).join('');

                document.getElementById('key-select').value = this.currentKey;
                this.updateLeaderKeyUI();
                this.renderChart();
            },

            handleLeaderChange() {
                const leaderId = document.getElementById('leader-select').value;
                const song = this.songs.find(s => s.id === this.currentSongId);
                this.pendingKeyChange = false;
                if (!leaderId) {
                    this.currentKey = song.defaultKey;
                } else {
                    const leader = this.leaders.find(l => l.id === leaderId);
                    const savedKey = (leader.preferredKeys || {})[this.currentSongId];
                    this.currentKey = savedKey || song.defaultKey;
                }
                document.getElementById('key-select').value = this.currentKey;
                this.updateLeaderKeyUI();
                this.renderChart();
            },

            handleManualKeyChange() {
                this.currentKey = document.getElementById('key-select').value;
                if (document.getElementById('leader-select').value) this.pendingKeyChange = true;
                this.updateLeaderKeyUI();
                this.renderChart();
            },

            updateLeaderKeyUI() {
                const indicator = document.getElementById('leader-key-indicator');
                const indicatorText = document.getElementById('indicator-text');
                const savePanel = document.getElementById('save-key-panel');
                const saveDesc = document.getElementById('save-key-desc');
                const removeBtn = document.getElementById('remove-key-btn');
                const leaderId = document.getElementById('leader-select').value;

                if (!leaderId) {
                    indicator.className = 'hidden'; indicator.style.display = 'none';
                    savePanel.classList.remove('visible');
                    return;
                }
                const leader = this.leaders.find(l => l.id === leaderId);
                if (!leader) return;
                const savedKey = (leader.preferredKeys || {})[this.currentSongId];
                const song = this.songs.find(s => s.id === this.currentSongId);

                indicator.style.display = '';
                if (savedKey) {
                    indicator.className = 'has-key';
                    indicatorText.textContent = savedKey === this.currentKey
                        ? `${leader.name} has a saved key for this song: ${savedKey}`
                        : `${leader.name}'s saved key is ${savedKey} — currently viewing: ${this.currentKey}`;
                } else {
                    indicator.className = 'no-key';
                    indicatorText.textContent = `No saved key for ${leader.name} on this song`;
                }
                savePanel.classList.add('visible');
                saveDesc.innerHTML = `Set <strong>${this.currentKey}</strong> as ${leader.name}'s preferred key for "<strong>${song.title}</strong>"?`;
                removeBtn.style.display = savedKey ? '' : 'none';
            },

            async saveKeyForLeader() {
                const leaderId = document.getElementById('leader-select').value;
                if (!leaderId) return;
                const leader = this.leaders.find(l => l.id === leaderId);
                const updatedKeys = { ...(leader.preferredKeys || {}), [this.currentSongId]: this.currentKey };
                this.setSyncStatus('syncing', 'Saving…');
                try {
                    await updateDoc(doc(db, 'leaders', leaderId), { preferredKeys: updatedKeys });
                    this.setSyncStatus('synced', 'Saved ✓');
                    this.pendingKeyChange = false;
                } catch (err) { console.error(err); this.setSyncStatus('error', 'Save failed'); }
            },

            async removeKeyForLeader() {
                const leaderId = document.getElementById('leader-select').value;
                if (!leaderId) return;
                const leader = this.leaders.find(l => l.id === leaderId);
                const updatedKeys = { ...(leader.preferredKeys || {}) };
                delete updatedKeys[this.currentSongId];
                this.setSyncStatus('syncing', 'Removing…');
                try {
                    await updateDoc(doc(db, 'leaders', leaderId), { preferredKeys: updatedKeys });
                    this.setSyncStatus('synced', 'Removed ✓');
                } catch (err) { console.error(err); this.setSyncStatus('error', 'Remove failed'); }
            },

            // ── Chord Rendering ────────────────────────────────────────────
            toggleFlats() { this.useFlats = !this.useFlats; this.renderChart(); },

            transposeChord(chordName, steps) {
                return chordName.split('/').map(part => {
                    const match = part.match(/^([A-G][#b]?)(.*)/);
                    if (!match) return part;
                    const root = match[1], quality = match[2];
                    let index = CHROMATIC_SHARP.indexOf(root);
                    if (index === -1) index = CHROMATIC_FLAT.indexOf(root);
                    if (index === -1) return part;
                    let ni = ((index + steps) % 12 + 12) % 12;
                    return (this.useFlats ? CHROMATIC_FLAT[ni] : CHROMATIC_SHARP[ni]) + quality;
                }).join('/');
            },

            buildChartHtml(song, targetKey) {
                let si = CHROMATIC_SHARP.indexOf(song.defaultKey);
                if (si === -1) si = CHROMATIC_FLAT.indexOf(song.defaultKey);
                let ti = CHROMATIC_SHARP.indexOf(targetKey);
                if (ti === -1) ti = CHROMATIC_FLAT.indexOf(targetKey);
                const steps = ti - si;
                let html = '';
                song.chordChart.split('\n').forEach(line => {
                    if (line.trim() === '') { html += '<br/>'; return; }
                    let lyricLine = `<span class="lyric-line">`;
                    let lastIndex = 0;
                    const regex = /\[(.*?)\]/g;
                    let match;
                    while ((match = regex.exec(line)) !== null) {
                        lyricLine += line.substring(lastIndex, match.index);
                        lyricLine += `<span class="chord">${this.transposeChord(match[1], steps)}</span>`;
                        lastIndex = regex.lastIndex;
                    }
                    lyricLine += line.substring(lastIndex) + `</span>`;
                    html += lyricLine;
                });
                return html;
            },

            renderChart() {
                const song = this.songs.find(s => s.id === this.currentSongId);
                if (!song) return;
                const html = this.buildChartHtml(song, this.currentKey);
                document.getElementById('chord-chart-container').innerHTML = html;
                document.getElementById('performance-content').innerHTML = html;
                this.renderDiatonic(this.currentKey);
            },

            renderDiatonic(key) {
                const formulas = [{label:'I',type:'Maj'},{label:'ii',type:'m'},{label:'iii',type:'m'},
                    {label:'IV',type:'Maj'},{label:'V',type:'Maj'},{label:'vi',type:'m'},{label:'vii°',type:'dim'}];
                const intervals = [0,2,4,5,7,9,11];
                let si = CHROMATIC_SHARP.indexOf(key);
                if (si === -1) si = CHROMATIC_FLAT.indexOf(key);
                document.getElementById('diatonic-helper').innerHTML = intervals.map((interval, idx) => {
                    const note = this.transposeChord(key, interval);
                    const suffix = formulas[idx].type === 'm' ? 'm' : (formulas[idx].type === 'dim' ? 'dim' : '');
                    return `<div class="diatonic-pill"><span>${formulas[idx].label}</span>${note}${suffix}</div>`;
                }).join('');
            },

            updateFontSize(size) {
                document.getElementById('chord-chart-container').style.fontSize = size + 'px';
            },

            enterPerformanceMode() {
                document.getElementById('performance-view').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            },
            exitPerformanceMode() {
                document.getElementById('performance-view').classList.add('hidden');
                document.body.style.overflow = 'auto';
            },

            populateKeyDropdowns() {
                ['key-select','edit-key'].forEach(id => {
                    document.getElementById(id).innerHTML =
                        CHROMATIC_SHARP.map(k => `<option value="${k}">${k}</option>`).join('');
                });
            },

            // ── CRUD: Songs ────────────────────────────────────────────────
            showAddSong() {
                this.showView('view-edit');
                document.getElementById('edit-view-title').innerText = 'Add New Song';
                ['edit-id','edit-title','edit-artist','edit-bpm','edit-tags','edit-chart'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('edit-key').value = 'G';
                document.getElementById('edit-time').value = '4/4';
            },

            editCurrentSong() {
                const song = this.songs.find(s => s.id === this.currentSongId);
                this.showView('view-edit');
                document.getElementById('edit-view-title').innerText = 'Edit Song';
                document.getElementById('edit-id').value = song.id;
                document.getElementById('edit-title').value = song.title;
                document.getElementById('edit-artist').value = song.artist;
                document.getElementById('edit-key').value = song.defaultKey;
                document.getElementById('edit-bpm').value = song.tempo;
                document.getElementById('edit-time').value = song.timeSignature;
                document.getElementById('edit-tags').value = (song.tags||[]).join(', ');
                document.getElementById('edit-chart').value = song.chordChart;
            },

            async saveSong() {
                const title = document.getElementById('edit-title').value.trim();
                const artist = document.getElementById('edit-artist').value.trim();
                if (!title || !artist) { alert('Title and Artist are required.'); return; }
                const id = document.getElementById('edit-id').value;
                const data = {
                    title, artist,
                    defaultKey: document.getElementById('edit-key').value,
                    tempo: parseInt(document.getElementById('edit-bpm').value) || 0,
                    timeSignature: document.getElementById('edit-time').value || '4/4',
                    tags: document.getElementById('edit-tags').value.split(',').map(t => t.trim()).filter(Boolean),
                    chordChart: document.getElementById('edit-chart').value
                };
                this.setSyncStatus('syncing', 'Saving…');
                try {
                    if (id) { await updateDoc(doc(db, 'songs', id), data); this.viewSong(id); }
                    else { const ref = await addDoc(collection(db, 'songs'), data); this.viewSong(ref.id); }
                    this.setSyncStatus('synced', 'Synced ✓');
                } catch (err) { console.error(err); this.setSyncStatus('error', 'Save failed'); alert('Error saving.'); }
            },

            async deleteCurrentSong() {
                if (!confirm('Delete this song permanently?')) return;
                this.setSyncStatus('syncing', 'Deleting…');
                try {
                    await deleteDoc(doc(db, 'songs', this.currentSongId));
                    this.setSyncStatus('synced', 'Synced ✓');
                    this.showSongs();
                } catch (err) { console.error(err); this.setSyncStatus('error', 'Delete failed'); }
            },

            // ── CRUD: Leaders ──────────────────────────────────────────────
            showLeaders() {
                this.showView('view-leaders');
                this.renderLeadersList();
            },

            renderLeadersList() {
                const list = document.getElementById('leaders-list');
                if (this.leaders.length === 0) {
                    list.innerHTML = `<div class="empty-state"><p>No leaders yet. Add one!</p></div>`; return;
                }
                list.innerHTML = this.leaders.map(l => {
                    const keyCount = Object.keys(l.preferredKeys || {}).length;
                    const badgeClass = keyCount === 0 ? 'keys-badge zero' : 'keys-badge';
                    const badgeClick = keyCount === 0 ? '' : `onclick="app.openLeaderModal('${l.id}')"`;
                    const badgeLabel = keyCount === 0 ? 'No custom keys' : `${keyCount} custom key${keyCount !== 1 ? 's' : ''} saved →`;
                    return `
                        <div class="leader-card">
                            <div style="display:flex; align-items:center;">
                                <div class="avatar">${l.initials}</div>
                                <div>
                                    <strong>${this.escHtml(l.name)}</strong><br/>
                                    <span class="${badgeClass}" ${badgeClick}>${badgeLabel}</span>
                                </div>
                            </div>
                            <button class="btn-outline" onclick="app.deleteLeader('${l.id}')">Remove</button>
                        </div>`;
                }).join('');
            },

            openLeaderModal(leaderId) {
                const leader = this.leaders.find(l => l.id === leaderId);
                if (!leader) return;
                document.getElementById('modal-leader-name').textContent = `${leader.name}'s Preferred Keys`;
                const keys = leader.preferredKeys || {};
                const songIds = Object.keys(keys);
                document.getElementById('modal-keys-list').innerHTML = songIds.length === 0
                    ? `<p style="color:var(--text-dim);font-size:0.9rem;">No custom keys saved yet.</p>`
                    : songIds.map(songId => {
                        const song = this.songs.find(s => s.id === songId);
                        if (!song) return '';
                        return `<div class="modal-song-row">
                            <div><div class="song-name">${this.escHtml(song.title)}</div>
                            <div class="song-artist">${this.escHtml(song.artist)} • Default: ${song.defaultKey}</div></div>
                            <div class="key-chip">${keys[songId]}</div>
                        </div>`;
                    }).filter(Boolean).join('');
                document.getElementById('leader-keys-modal').classList.remove('hidden');
            },

            closeLeaderModal() {
                document.getElementById('leader-keys-modal').classList.add('hidden');
            },

            async addLeader() {
                const name = prompt('Enter leader name:');
                if (!name || !name.trim()) return;
                const trimmed = name.trim();
                this.setSyncStatus('syncing', 'Saving…');
                try {
                    await addDoc(collection(db, 'leaders'), { name: trimmed, initials: trimmed.charAt(0).toUpperCase(), preferredKeys: {} });
                    this.setSyncStatus('synced', 'Synced ✓');
                    this.showLeaders();
                } catch (err) { console.error(err); this.setSyncStatus('error', 'Save failed'); }
            },

            async deleteLeader(id) {
                if (!confirm('Remove this leader?')) return;
                this.setSyncStatus('syncing', 'Removing…');
                try {
                    await deleteDoc(doc(db, 'leaders', id));
                    this.setSyncStatus('synced', 'Synced ✓');
                    this.showLeaders();
                } catch (err) { console.error(err); this.setSyncStatus('error', 'Remove failed'); }
            },

            // ── Utility ────────────────────────────────────────────────────
            escHtml(str) {
                return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }
        };

        window.app = app;
        app.init();
    </script>
</body>
</html>
