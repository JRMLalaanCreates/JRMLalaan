<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRM Lalaan Worship Chords</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a; /* Dark Navy */
            --bg-card: #1e293b;
            --accent: #fbbf24; /* Gold/Amber */
            --text-main: #fef3c7; /* Cream */
            --text-dim: #94a3b8;
            --forest: #064e3b;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            margin-bottom: 30px;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .nav-links button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            margin-left: 10px;
            transition: 0.3s;
        }

        .btn {
            background: var(--accent);
            color: var(--bg-deep);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            background: var(--bg-card);
            border: 1px solid #334155;
            color: var(--text-main);
            border-radius: 6px;
            font-size: 1rem;
        }

        /* --- SONG LIST --- */
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .song-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            border-left: 4px solid var(--accent);
            transition: transform 0.2s;
        }
        .song-card:hover { transform: translateY(-3px); }
        .song-card h3 { color: var(--accent); margin-bottom: 5px; font-family: var(--font-serif); }

        /* --- CHORD CHART --- */
        #chord-chart-container {
            background: #fff;
            color: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre;
            font-family: var(--font-mono);
            line-height: 2.4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .chord { color: #b45309; font-weight: bold; position: absolute; margin-top: -1.3em; }
        .lyric-line { position: relative; display: block; margin-top: 1.3em; }

        .controls-panel {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .control-group { flex: 1; min-width: 140px; }
        .control-group label { display: block; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }

        .diatonic-pill {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .diatonic-pill span { font-size: 0.6rem; opacity: 0.6; }

        .hidden { display: none; }
        .loading-screen { position: fixed; inset: 0; background: var(--bg-deep); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">
        <h2 style="color:var(--accent); font-family:var(--font-serif)">Connecting to JRM Cloud...</h2>
    </div>

    <div class="container">
        <nav>
            <div class="logo" onclick="window.app.showSongs()">JRM Worship</div>
            <div class="nav-links">
                <button onclick="window.app.showSongs()">Songs</button>
                <button onclick="window.app.showLeaders()">Leaders</button>
                <button onclick="window.app.showAddSong()">+ New Song</button>
            </div>
        </nav>
    </div>

    <!-- VIEW: SONG LIST -->
    <div id="view-list" class="container view">
        <input type="text" id="song-search" placeholder="Search title or artist..." oninput="window.app.filterSongs()">
        <div id="song-grid" class="song-grid"></div>
    </div>

    <!-- VIEW: SONG DETAIL -->
    <div id="view-detail" class="container view hidden">
        <button class="btn-outline" onclick="window.app.showSongs()" style="margin-bottom:20px;">← Back to Repository</button>
        
        <h1 id="detail-title" style="font-size: 2.8rem; font-family: var(--font-serif); color: var(--accent);"></h1>
        <p id="detail-meta" style="color: var(--text-dim); margin-bottom: 25px;"></p>

        <div class="controls-panel">
            <div class="control-group">
                <label>Vocalist/Leader</label>
                <select id="leader-select" onchange="window.app.handleLeaderChange()"></select>
            </div>
            <div class="control-group">
                <label>Transpose Key</label>
                <select id="key-select" onchange="window.app.handleManualKeyChange()"></select>
            </div>
            <div class="control-group">
                <label>Accidentals</label>
                <button class="btn-outline" style="width:100%" onclick="window.app.toggleFlats()"># / ♭ Toggle</button>
            </div>
        </div>

        <div id="diatonic-helper" style="margin-bottom: 20px;"></div>
        
        <div id="chord-chart-container"></div>
        
        <div style="margin-top: 40px; display: flex; gap: 10px;">
            <button class="btn-outline" onclick="window.app.editCurrentSong()">Edit Song Content</button>
            <button class="btn-outline" style="color:#f87171; border-color:#f87171" onclick="window.app.deleteSong()">Delete Song</button>
        </div>
    </div>

    <!-- VIEW: EDIT/ADD -->
    <div id="view-edit" class="container view hidden">
        <h2 id="edit-view-title" style="margin-bottom: 20px; font-family: var(--font-serif);">Add New Song</h2>
        <form onsubmit="window.app.saveSong(event)">
            <input type="hidden" id="edit-id">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="edit-title" placeholder="Song Title" required>
                <input type="text" id="edit-artist" placeholder="Original Artist">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <select id="edit-key"></select>
                <input type="text" id="edit-bpm" placeholder="BPM (e.g. 72)">
                <input type="text" id="edit-time" placeholder="Time (e.g. 4/4)">
            </div>
            <label style="font-size: 0.8rem; color: var(--text-dim);">Chart Format: [G]Lyrics go [C]here</label>
            <textarea id="edit-chart" rows="15" placeholder="Enter chords and lyrics..."></textarea>
            
            <button type="submit" class="btn">Save to Cloud</button>
            <button type="button" class="btn-outline" onclick="window.app.showSongs()">Cancel</button>
        </form>
    </div>

    <!-- VIEW: LEADERS -->
    <div id="view-leaders" class="container view hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px;">
            <h2 style="font-family: var(--font-serif);">Vocal Leaders</h2>
            <button class="btn" onclick="window.app.addLeader()">+ Add Leader</button>
        </div>
        <div id="leaders-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDKzrReZCSHgOPWzvAccygflLGcwtAP7Mo",
            authDomain: "jrm-lalaan-worship-chords.firebaseapp.com",
            projectId: "jrm-lalaan-worship-chords",
            storageBucket: "jrm-lalaan-worship-chords.firebasestorage.app",
            messagingSenderId: "318238516737",
            appId: "1:318238516737:web:4c8707fdf0fcaf4edec200"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);

        const NOTES_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const NOTES_FLAT  = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

        window.app = {
            songs: [],
            leaders: [],
            currentSongId: null,
            currentKey: 'G',
            useFlats: false,

            init() {
                this.populateDropdowns();
                
                // Live Stream Songs
                onSnapshot(collection(db, "songs"), (snapshot) => {
                    this.songs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.renderSongList(this.songs);
                    document.getElementById('loading').classList.add('hidden');
                });

                // Live Stream Leaders
                onSnapshot(collection(db, "leaders"), (snapshot) => {
                    this.leaders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if(this.currentSongId) this.updateLeaderDropdown();
                    if(!document.getElementById('view-leaders').classList.contains('hidden')) this.renderLeaders();
                });
            },

            populateDropdowns() {
                const keysHtml = NOTES_SHARP.map(k => `<option value="${k}">${k}</option>`).join('');
                document.getElementById('key-select').innerHTML = keysHtml;
                document.getElementById('edit-key').innerHTML = keysHtml;
            },

            renderSongList(list) {
                const grid = document.getElementById('song-grid');
                grid.innerHTML = list.sort((a,b) => a.title.localeCompare(b.title)).map(s => `
                    <div class="song-card" onclick="window.app.viewSong('${s.id}')">
                        <h3>${s.title}</h3>
                        <p>${s.artist || 'Unknown Artist'} • Key: ${s.defaultKey}</p>
                    </div>
                `).join('');
            },

            filterSongs() {
                const q = document.getElementById('song-search').value.toLowerCase();
                const filtered = this.songs.filter(s => 
                    s.title.toLowerCase().includes(q) || (s.artist && s.artist.toLowerCase().includes(q))
                );
                this.renderSongList(filtered);
            },

            viewSong(id) {
                const song = this.songs.find(s => s.id === id);
                this.currentSongId = id;
                this.currentKey = song.defaultKey;
                
                this.showView('view-detail');
                document.getElementById('detail-title').innerText = song.title;
                document.getElementById('detail-meta').innerText = `${song.artist || ''} | ${song.bpm || '--'} BPM | ${song.time || '--'}`;
                document.getElementById('key-select').value = this.currentKey;
                
                this.updateLeaderDropdown();
                this.renderChart();
            },

            updateLeaderDropdown() {
                const sel = document.getElementById('leader-select');
                const song = this.songs.find(s => s.id === this.currentSongId);
                sel.innerHTML = `<option value="">Original Key (${song.defaultKey})</option>` + 
                    this.leaders.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
            },

            handleLeaderChange() {
                const leaderId = document.getElementById('leader-select').value;
                const song = this.songs.find(s => s.id === this.currentSongId);
                
                if (leaderId) {
                    const leader = this.leaders.find(l => l.id === leaderId);
                    this.currentKey = leader.preferredKeys?.[this.currentSongId] || song.defaultKey;
                } else {
                    this.currentKey = song.defaultKey;
                }
                
                document.getElementById('key-select').value = this.currentKey;
                this.renderChart();
            },

            async handleManualKeyChange() {
                this.currentKey = document.getElementById('key-select').value;
                const leaderId = document.getElementById('leader-select').value;
                
                if (leaderId) {
                    const leader = this.leaders.find(l => l.id === leaderId);
                    const prefs = leader.preferredKeys || {};
                    prefs[this.currentSongId] = this.currentKey;
                    await updateDoc(doc(db, "leaders", leaderId), { preferredKeys: prefs });
                }
                this.renderChart();
            },

            renderChart() {
                const song = this.songs.find(s => s.id === this.currentSongId);
                const steps = this.calcSteps(song.defaultKey, this.currentKey);
                
                const html = song.chordChart.split('\n').map(line => {
                    if (!line.trim()) return '<br>';
                    const processed = line.replace(/\[(.*?)\]/g, (m, chord) => {
                        return `<span class="chord">${this.transpose(chord, steps)}</span>`;
                    });
                    return `<span class="lyric-line">${processed}</span>`;
                }).join('');

                document.getElementById('chord-chart-container').innerHTML = html;
                this.renderDiatonic();
            },

            transpose(chord, steps) {
                return chord.split('/').map(part => {
                    const m = part.match(/^([A-G][#b]?)(.*)/);
                    if (!m) return part;
                    let idx = NOTES_SHARP.indexOf(m[1]);
                    if (idx === -1) idx = NOTES_FLAT.indexOf(m[1]);
                    let newIdx = (idx + steps) % 12;
                    if (newIdx < 0) newIdx += 12;
                    return (this.useFlats ? NOTES_FLAT[newIdx] : NOTES_SHARP[newIdx]) + m[2];
                }).join('/');
            },

            calcSteps(from, to) {
                let f = NOTES_SHARP.indexOf(from); if(f === -1) f = NOTES_FLAT.indexOf(from);
                let t = NOTES_SHARP.indexOf(to); if(t === -1) t = NOTES_FLAT.indexOf(to);
                return t - f;
            },

            renderDiatonic() {
                const labels = ['I','ii','iii','IV','V','vi','vii°'];
                const steps = [0, 2, 4, 5, 7, 9, 11];
                document.getElementById('diatonic-helper').innerHTML = steps.map((s, i) => `
                    <div class="diatonic-pill"><span>${labels[i]}</span>${this.transpose(this.currentKey, s)}</div>
                `).join('');
            },

            toggleFlats() { this.useFlats = !this.useFlats; this.renderChart(); },

            // NAVIGATION & CRUD
            showView(id) {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
                window.scrollTo(0,0);
            },

            showSongs() { this.showView('view-list'); },
            
            showAddSong() {
                this.showView('view-edit');
                document.getElementById('edit-view-title').innerText = "Add New Song";
                document.getElementById('edit-id').value = "";
                document.getElementById('edit-title').value = "";
                document.getElementById('edit-artist').value = "";
                document.getElementById('edit-chart').value = "";
            },

            editCurrentSong() {
                const song = this.songs.find(s => s.id === this.currentSongId);
                this.showView('view-edit');
                document.getElementById('edit-view-title').innerText = "Edit Song";
                document.getElementById('edit-id').value = song.id;
                document.getElementById('edit-title').value = song.title;
                document.getElementById('edit-artist').value = song.artist || '';
                document.getElementById('edit-key').value = song.defaultKey;
                document.getElementById('edit-bpm').value = song.bpm || '';
                document.getElementById('edit-time').value = song.time || '';
                document.getElementById('edit-chart').value = song.chordChart;
            },

            async saveSong(e) {
                e.preventDefault();
                const id = document.getElementById('edit-id').value;
                const data = {
                    title: document.getElementById('edit-title').value,
                    artist: document.getElementById('edit-artist').value,
                    defaultKey: document.getElementById('edit-key').value,
                    bpm: document.getElementById('edit-bpm').value,
                    time: document.getElementById('edit-time').value,
                    chordChart: document.getElementById('edit-chart').value
                };
                if (id) await updateDoc(doc(db, "songs", id), data);
                else await addDoc(collection(db, "songs"), data);
                this.showSongs();
            },

            async deleteSong() {
                if(confirm("Permanently delete this song?")) {
                    await deleteDoc(doc(db, "songs", this.currentSongId));
                    this.showSongs();
                }
            },

            showLeaders() {
                this.showView('view-leaders');
                this.renderLeaders();
            },

            renderLeaders() {
                document.getElementById('leaders-list').innerHTML = this.leaders.map(l => `
                    <div style="background:var(--bg-card); padding:20px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h3 style="color:var(--accent)">${l.name}</h3>
                            <small>${Object.keys(l.preferredKeys || {}).length} song preferences saved</small>
                        </div>
                        <button class="btn-outline" style="color:#f87171; border-color:#f87171" onclick="window.app.deleteLeader('${l.id}')">Remove</button>
                    </div>
                `).join('');
            },

            async addLeader() {
                const n = prompt("Enter Leader Name:");
                if(n) await addDoc(collection(db, "leaders"), { name: n, preferredKeys: {} });
            },

            async deleteLeader(id) {
                if(confirm("Remove this leader?")) await deleteDoc(doc(db, "leaders", id));
            }
        };

        window.app.init();
    </script>
</body>
</html>
